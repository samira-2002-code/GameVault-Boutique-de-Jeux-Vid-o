<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Panier - GameVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { min-height: 100vh; background-color: #0f172a; color: #e2e8f0; }
    .card img { min-height: 170px; object-fit: cover; }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-7xl mx-auto p-4">
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
      <h1 class="text-3xl sm:text-4xl font-bold text-white">Mon Panier</h1>
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-slate-300 hover:text-white" title="Retour au catalogue">← Retour au catalogue</a>
        <p class="text-sm text-slate-300">Jeux vidéo dématérialisés</p>
      </div>
    </header>

    <section id="cartSection" class="bg-slate-900 p-4 rounded-xl shadow-lg">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
        <h2 class="text-2xl font-semibold">Produits dans le panier</h2>
        <button id="orderBtn" class="bg-emerald-500 text-black px-4 py-2 rounded-lg hover:bg-emerald-400">Commander</button>
      </div>
      <div id="cartContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
      <div class="mt-4 text-right">
        <span class="text-xl font-bold">Total : </span>
        <span id="cartTotal" class="text-xl">0 €</span>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
