<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
    <h1 class="text-3xl sm:text-4xl font-bold text-white">GameVault</h1>
    <p class="text-sm text-slate-300">Jeux vidéo dématérialisés - Catalogue & Panier</p>
  </header>

  <section class="bg-slate-900 p-4 rounded-xl shadow-lg mb-6">
    <input id="searchInput" type="search" placeholder="Recherche par titre..." class="rounded-lg border border-slate-700 bg-slate-800 text-white px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full md:w-72" />
  </section>

  <section id="catalogSection" class="mb-8">
    <h2 class="text-2xl font-semibold mb-4">Catalogue de jeux</h2>
    <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
